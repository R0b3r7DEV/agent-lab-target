# Dependabot: propone bumps de forma controlada.
# - github-actions: mantiene al dia los SHAs pineados en los workflows (el pin por
#   SHA congela la version; Dependabot es quien propone subirla, revisada, via PR).
# - composer: dependencias PHP del lab.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
