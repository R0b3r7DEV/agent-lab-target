# Configuracion de servicios de la aplicacion.
# El nivel de defensa (LAB_LEVEL) se resuelve SIEMPRE en runtime (ver ADR 05):
# aqui solo se inyecta el valor de entorno como binding; nunca se hornea en el
# contenedor compilado.
parameters:
    # Nivel por defecto cuando LAB_LEVEL no esta en el entorno. Ver ADR 11: LAB_LEVEL
    # NO se declara en .env (evita ensombrecer la env del compose en $_ENV); se
    # resuelve con `default:` -> este parametro cuando falta, o getenv() cuando existe.
    lab_level_default: '0'

    # Politica de confirmacion del HITL del Nivel 2 (ADR 06). Mismo motivo que
    # LAB_LEVEL: NO se declara en .env (si no, el 'deny' del .env ensombreceria en
    # $_ENV un LAB_CONFIRM_POLICY=allow del compose). Default seguro: 'deny'.
    lab_confirm_policy_default: 'deny'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            # Se inyecta como STRING (no `int:`) para poder validar estrictamente
            # en runtime: `int:` castearia "foo" a 0 en silencio, rompiendo el
            # "fallo fuerte" del nivel invalido (ver LabLevelResolver / Tarea D).
            # `default:` -> si LAB_LEVEL no esta en el entorno, usa lab_level_default.
            string $envLevel: '%env(default:lab_level_default:LAB_LEVEL)%'
            # Mismo patron para la politica de confirmacion (ADR 06/11).
            string $confirmPolicy: '%env(default:lab_confirm_policy_default:LAB_CONFIRM_POLICY)%'

    # Toda herramienta del agente se autoconfigura con el tag que descubre el
    # compiler pass (AgentToolPass).
    _instanceof:
        App\Tool\AgentToolInterface:
            tags: ['app.agent_tool']

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    # ToolRegistry recibe sus argumentos del AgentToolPass; se declaran como
    # placeholders para que el autowiring no intente resolver el array/locator.
    App\Tool\ToolRegistry:
        # public: lo consumira el AgentService (Fase 4); hasta entonces, publico para
        # que no lo elimine el contenedor y sea recuperable en los tests.
        public: true
        arguments:
            $definitions: []
            $tools: !service_locator {}
