; Config PHP del laboratorio.
; max_execution_time >= 180s para acompanar el timeout de request de Caddy:
; las llamadas al LLM con tool use pueden encadenar varias iteraciones.
max_execution_time = 180
memory_limit = 256M

; El error del contenedor va al log, no se muestra al cliente.
; Por defecto el contenedor corre en APP_ENV=prod (ver ADR 11), asi que Symfony
; no expone detalle de errores; dev es opt-in explicito.
display_errors = Off
log_errors = On

; NOTA (ADR 11): NO se fija `variables_order = "EGPCS"`. La `E` poblaria $_ENV con
; TODAS las variables de entorno, incluida ANTHROPIC_API_KEY (fuga real via
; profiler y, sobre todo, via read_file -> /proc/self/environ). No hace falta: la
; env del compose gana via getenv() siempre que el .env no la ensombrezca, por eso
; LAB_LEVEL ya no se declara en .env y se resuelve con el procesador `default:`.
